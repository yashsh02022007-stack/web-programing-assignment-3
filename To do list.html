<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            text-align: center;
        }

        .container {
            width: 50%;
            margin: auto;
            margin-top: 60px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete-btn {
            background: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
    let tasks = [];

    function addTask() {
        let taskText = document.getElementById("taskInput").value;

        if (taskText === "") {
            alert("Please enter a task!");
            return;
        }

        let task = { text: taskText, completed: false };
        tasks.push(task);

        displayTasks();
        document.getElementById("taskInput").value = "";
    }

    function displayTasks() {
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                <span onclick="toggleComplete(${index})" class="${task.completed ? 'completed' : ''}">
                    ${task.text}
                </span>
                <button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
            `;

            list.appendChild(li);
        });
    }

    function toggleComplete(index) {
        tasks[index].completed = !tasks[index].completed;
        displayTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        displayTasks();
    }
</script>

</body>
</html>
